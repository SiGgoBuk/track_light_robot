<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - 조명로봇 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            margin: 0 auto;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header text-center bg-white">
            <h3 class="mb-0">🤖 비밀번호 찾기</h3>
            <p class="text-muted mt-2 mb-0">가입한 이메일을 입력해주세요</p>
        </div>
        <div class="card-body p-4">
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

            <form method="post" action="/forgot-password">
                <div class="mb-3">
                    <label for="username" class="form-label">이메일</label>
                    <input type="email" class="form-control" id="username" name="username"
                           placeholder="example@email.com" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">재설정 링크 받기</button>
            </form>

            <div class="text-center">
                <a href="/login" class="text-decoration-none">로그인으로 돌아가기</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
