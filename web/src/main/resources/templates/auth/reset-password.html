<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 조명로봇 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            margin: 0 auto;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header text-center bg-white">
            <h3 class="mb-0">🔒 새 비밀번호 설정</h3>
            <p class="text-muted mt-2 mb-0">새로운 비밀번호를 입력해주세요</p>
        </div>
        <div class="card-body p-4">
            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

            <form method="post" action="/reset-password">
                <input type="hidden" name="code" th:value="${code}">

                <div class="mb-3">
                    <label for="newPassword" class="form-label">새 비밀번호</label>
                    <input type="password" class="form-control" id="newPassword" name="newPassword"
                           placeholder="새 비밀번호" required>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">새 비밀번호 확인</label>
                    <input type="password" class="form-control" id="confirmPassword"
                           placeholder="새 비밀번호 확인" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">비밀번호 재설정</button>
            </form>

            <div class="text-center">
                <a href="/login" class="text-decoration-none">로그인 페이지로</a>
            </div>
        </div>
    </div>
</div>

<script>
    // 비밀번호 확인 검증
    document.querySelector('form').addEventListener('submit', function(e) {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            e.preventDefault();
            alert('비밀번호가 일치하지 않습니다.');
        }
    });
</script>
</body>
</html>
