<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 조명로봇 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .signup-container {
            max-width: 450px;
            margin: 2rem auto;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="signup-container">
        <div class="card">
            <div class="card-header text-center bg-white">
                <h3 class="mb-0">🤖 조명로봇 시스템</h3>
                <p class="text-muted mt-2">회원가입</p>
            </div>
            <div class="card-body p-4">
                <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                <form method="post" action="/signup">
                    <div class="mb-3">
                        <label for="username" class="form-label">이메일</label>
                        <input type="email" class="form-control" id="username" name="username"
                               placeholder="example@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="4자 이상" minlength="4" required>
                    </div>
                    <div class="mb-3">
                        <label for="firstName" class="form-label">이름</label>
                        <input type="text" class="form-control" id="firstName" name="firstName"
                               placeholder="홍길동" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">가입하기</button>
                </form>

                <div class="text-center">
                    <span>이미 계정이 있으신가요?</span>
                    <a href="/login" class="text-decoration-none ms-1">로그인</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
