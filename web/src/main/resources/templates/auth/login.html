<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 조명로봇 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-container {
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card-header {
            background: white;
            border-bottom: none;
            padding: 2rem 2rem 0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-container">
        <div class="card">
            <div class="card-header text-center">
                <h3 class="mb-0">🤖 조명로봇 시스템</h3>
                <p class="text-muted mt-2">로그인</p>
            </div>
            <div class="card-body p-4">
                <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                <form method="post" action="/login">
                    <div class="mb-3">
                        <label for="username" class="form-label">이메일</label>
                        <input type="email" class="form-control" id="username" name="username"
                               placeholder="example@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="비밀번호 입력" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">로그인</button>
                </form>

                <div class="text-center">
                    <a href="/forgot-password" class="text-decoration-none">비밀번호 찾기</a>
                    <span class="mx-2">|</span>
                    <a href="/signup" class="text-decoration-none">회원가입</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
