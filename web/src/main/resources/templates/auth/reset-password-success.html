<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 완료 - 조명로봇 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 0 auto;
        }
        .success-icon {
            font-size: 4rem;
            color: #28a745;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-body text-center p-5">
            <div class="success-icon mb-3">✅</div>
            <h3 class="mb-3">비밀번호가 변경되었습니다</h3>
            <p class="text-muted mb-4" th:text="${message}">새 비밀번호로 로그인할 수 있습니다.</p>

            <div class="alert alert-success">
                <strong>성공!</strong> 비밀번호가 안전하게 재설정되었습니다.
            </div>

            <a href="/login" class="btn btn-primary w-100 mt-3">로그인하기</a>
        </div>
    </div>
</div>
</body>
</html>
