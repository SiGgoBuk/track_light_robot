<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인증 실패 - 조명로봇 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 0 auto;
        }
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-body text-center p-5">
            <div class="error-icon mb-3">❌</div>
            <h3 class="mb-3">인증에 실패했습니다</h3>
            <p class="text-muted mb-4" th:text="${error}">유효하지 않은 인증 코드입니다.</p>

            <div class="alert alert-warning text-start">
                <strong>가능한 원인:</strong>
                <ul class="mb-0 mt-2">
                    <li>인증 코드가 만료되었습니다</li>
                    <li>잘못된 링크를 사용했습니다</li>
                    <li>이미 인증이 완료되었습니다</li>
                </ul>
            </div>

            <div class="d-grid gap-2 mt-4">
                <a href="/signup" class="btn btn-primary">다시 회원가입</a>
                <a href="/login" class="btn btn-outline-secondary">로그인</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
