<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 삭제 - 조명로봇 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            margin: 0 auto;
        }
        .btn-danger {
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header text-center bg-white">
            <h3 class="mb-0 text-danger">⚠️ 계정 삭제</h3>
            <p class="text-muted mt-2 mb-0">정말로 계정을 삭제하시겠습니까?</p>
        </div>
        <div class="card-body p-4">
            <div class="alert alert-warning">
                <strong>주의:</strong> 계정 삭제 시 모든 데이터가 영구적으로 삭제되며 복구할 수 없습니다.
            </div>

            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

            <form method="post" action="/delete-account" onsubmit="return confirm('정말로 계정을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.');">
                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호 확인</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="비밀번호를 입력하세요" required>
                    <small class="text-muted">계정 삭제를 위해 비밀번호를 입력해주세요.</small>
                </div>
                <button type="submit" class="btn btn-danger w-100 mb-3">계정 삭제</button>
            </form>

            <div class="text-center">
                <a href="/mypage" class="text-decoration-none">취소하고 돌아가기</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
