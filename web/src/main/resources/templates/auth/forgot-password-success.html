<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 발송 완료 - 조명로봇 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 0 auto;
        }
        .success-icon {
            font-size: 4rem;
            color: #28a745;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-body text-center p-5">
            <div class="success-icon mb-3">✉️</div>
            <h3 class="mb-3">이메일을 확인해주세요</h3>
            <p class="text-muted mb-4" th:text="${message}">비밀번호 재설정 이메일이 발송되었습니다.</p>

            <div class="alert alert-info text-start">
                <strong>다음 단계:</strong>
                <ol class="mb-0 mt-2">
                    <li>이메일 수신함을 확인하세요</li>
                    <li>비밀번호 재설정 링크를 클릭하세요</li>
                    <li>새 비밀번호를 입력하세요</li>
                </ol>
            </div>

            <p class="text-muted small mt-3">
                이메일이 오지 않았나요? 스팸 메일함을 확인해보세요.
            </p>

            <a href="/login" class="btn btn-outline-secondary mt-3">로그인 페이지로</a>
        </div>
    </div>
</div>
</body>
</html>
