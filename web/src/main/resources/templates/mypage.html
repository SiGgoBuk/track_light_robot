<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 조명로봇 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .info-card {
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product-list-item {
            border: none;
            border-bottom: 1px solid #eee;
            padding: 1rem;
            transition: background-color 0.2s;
        }
        .product-list-item:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
<!-- 네비게이션 -->
<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <a href="/dashboard" class="navbar-brand mb-0 h1">🤖 조명로봇 시스템</a>
        <div class="d-flex">
            <a href="/dashboard" class="btn btn-light btn-sm me-2">대시보드</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">로그아웃</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">마이페이지</h2>

    <!-- 성공/에러 메시지 -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 사용자 정보 -->
    <div class="card info-card mb-4">
        <div class="card-header bg-white">
            <h5 class="mb-0">내 정보</h5>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">이름</div>
                <div class="col-md-9" th:text="${user.firstName}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">이메일</div>
                <div class="col-md-9" th:text="${user.username}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">이메일 인증</div>
                <div class="col-md-9">
                    <span th:if="${user.emailVerified}" class="badge bg-success">인증 완료</span>
                    <span th:unless="${user.emailVerified}" class="badge bg-warning">미인증</span>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">가입일</div>
                <div class="col-md-9" th:text="${#temporals.format(user.dateJoined, 'yyyy-MM-dd HH:mm')}"></div>
            </div>
            <div class="row">
                <div class="col-md-3 fw-bold">최근 로그인</div>
                <div class="col-md-9" th:text="${#temporals.format(user.lastLogin, 'yyyy-MM-dd HH:mm')}"></div>
            </div>
        </div>
    </div>

    <!-- 등록된 제품 목록 -->
    <div class="card info-card">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <div>
                <h5 class="mb-0 d-inline">등록된 제품</h5>
                <span class="badge bg-primary ms-2" th:text="${#lists.size(products)} + '개'"></span>
            </div>
            <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addProductModal">
                + 추가
            </button>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(products)}" class="p-4 text-center text-muted">
                등록된 제품이 없습니다.
            </div>

            <div th:each="product : ${products}" class="product-list-item">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1" th:text="${product.name ?: '제품 ' + product.id}"></h6>
                        <small class="text-muted">
                            제품번호: <span th:text="${product.productNumber}"></span>
                        </small>
                        <br>
                        <small class="text-muted" th:if="${product.ipAddress}">
                            IP: <span th:text="${product.ipAddress}"></span>
                        </small>
                    </div>
                    <div class="btn-group">
                        <a th:href="@{/product/detail(productId=${product.id})}"
                           class="btn btn-sm btn-outline-primary">상세보기</a>
                        <button type="button" class="btn btn-sm btn-outline-danger"
                                th:data-product-id="${product.id}"
                                th:data-product-name="${product.name ?: '제품 ' + product.id}"
                                onclick="deleteProduct(this.getAttribute('data-product-id'), this.getAttribute('data-product-name'))">
                            제거
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 계정 관리 -->
    <div class="card info-card mt-4">
        <div class="card-header bg-white">
            <h5 class="mb-0">계정 관리</h5>
        </div>
        <div class="card-body">
            <div class="d-grid gap-2">
                <a href="/change-password" class="btn btn-outline-secondary">비밀번호 변경</a>
                <a href="/delete-account" class="btn btn-outline-danger">계정 삭제</a>
            </div>
        </div>
    </div>
</div>

<!-- 제품 추가 모달 -->
<div class="modal fade" id="addProductModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">제품 추가</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" action="/product/register">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="productNumber" class="form-label">제품 번호 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="productNumber" name="productNumber"
                               placeholder="제품 고유 번호를 입력하세요" required>
                    </div>
                    <div class="mb-3">
                        <label for="productName" class="form-label">제품 이름 (선택)</label>
                        <input type="text" class="form-control" id="productName" name="name"
                               placeholder="예: 거실 조명로봇">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">추가</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 제품 삭제 폼 (숨김) -->
<form id="deleteProductForm" method="post" action="/product/unregister" style="display: none;">
    <input type="hidden" id="deleteProductId" name="productId">
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function deleteProduct(productId, productName) {
        if (confirm('"' + productName + '"을(를) 정말 제거하시겠습니까?')) {
            document.getElementById('deleteProductId').value = productId;
            document.getElementById('deleteProductForm').submit();
        }
    }
</script>
</body>
</html>
